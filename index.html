<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kotoba Master | Dynamic Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS with Dark Mode Enabled -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.344.0/font/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow: hidden; font-style: normal !important; }
        * { font-style: normal !important; }
        .card-inner { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .backface-hidden { backface-visibility: hidden; }
        
        /* Resizer styles for Light/Dark mode */
        .resizer { width: 12px; cursor: col-resize; z-index: 40; transition: background 0.2s; }
        .resizer { background: #f1f5f9; }
        .dark .resizer { background: #1e293b; }
        .resizer:hover, .resizer.dragging { background: #6366f1 !important; }
        
        .rotate-y-180 { transform: rotateY(180deg); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
        .quiz-scale-container { transition: transform 0.2s ease-out; transform-origin: center; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-950 transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo, useRef } = React;

        const REPO_OWNER = "elronimous"; 
        const REPO_NAME = "Kotoba-Master";       
        const DATA_FOLDER_PATH = "data"; 

        const MONTHS = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];

        const getOrdinal = (n) => {
            const s = ["th", "st", "nd", "rd"], v = n % 100;
            return n + (s[(v - 20) % 10] || s[v] || s[0]);
        };

        const formatMeaningText = (text) => {
            if (!text) return null;
            const parts = text.split(/(\([^)]+\)|\[[^\]]+\])/g);
            return parts.map((part, i) => {
                if (/^[\(\[]\d+[\)\]]$/.test(part)) return part; 
                if (/^[\(\[].*[\)\]]$/.test(part)) return <span key={i} className="text-slate-400 dark:text-slate-500 text-[0.85em] font-medium">{part}</span>; 
                return part;
            });
        };

        const App = () => {
            const [isDarkMode, setIsDarkMode] = useState(false);
            const [viewMode, setViewMode] = useState('split');
            const [splitPercent, setSplitPercent] = useState(75); 
            const [isSwapped, setIsSwapped] = useState(false); 
            const [quizScale, setQuizScale] = useState(1.0);
            const [files, setFiles] = useState([]);
            const [activeFile, setActiveFile] = useState(null);
            const [currentYear, setCurrentYear] = useState(new Date().getFullYear());
            const [openMonth, setOpenMonth] = useState(new Date().getMonth());
            const [debugLogs, setDebugLogs] = useState([]);
            
            const [fileContent, setFileContent] = useState({ url: '', title: '', vocab: [] });
            const [sessionCards, setSessionCards] = useState([]);
            const [mistakeTracker, setMistakeTracker] = useState([]);
            const [quizType, setQuizType] = useState(null);
            const [isFlipped, setIsFlipped] = useState(false);
            const [mcqSelected, setMcqSelected] = useState(null);
            const [isFinished, setIsFinished] = useState(false);
            const [isDragging, setIsDragging] = useState(false);
            const [showNextButton, setShowNextButton] = useState(false);

            const [selectedWordIds, setSelectedWordIds] = useState([]);
            const [isSelectionMode, setIsSelectionMode] = useState(false);

            // Toggle Dark Mode Class on Document
            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            const addLog = (msg) => setDebugLogs(prev => [...prev, msg].slice(-10));

            const parseFileText = (text) => {
                const lines = text.split(/\r?\n/).map(l => l.trim());
                const url = lines[0] || '';
                const title = lines[1] || 'Untitled';
                const vocab = [];
                let currentItem = null;

                for (let i = 2; i < lines.length; i++) {
                    const line = lines[i];
                    if (!line) continue;
                    const headMatch = line.match(/^([^\[]+)(?:\[([^\]]+)\])?/);
                    if (headMatch && !line.startsWith('(')) {
                        if (currentItem) vocab.push(currentItem);
                        currentItem = { id: vocab.length, word: headMatch[1].trim(), reading: (headMatch[2] || headMatch[1]).trim(), meaning: "" };
                    } else if (currentItem) {
                        const formattedLine = line.replace(/(\(\d+\))/g, '\n$1').trim();
                        currentItem.meaning += (currentItem.meaning ? '\n' : '') + formattedLine;
                    }
                }
                if (currentItem) vocab.push(currentItem);
                return { url, title, vocab };
            };

            const scanDataFolder = async () => {
                addLog("Connecting to GitHub API...");
                const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${DATA_FOLDER_PATH}`;
                try {
                    const response = await fetch(apiUrl);
                    if (!response.ok) throw new Error("API Request Failed.");
                    const remoteFiles = await response.json();
                    const txtFiles = remoteFiles.filter(f => f.name.endsWith('.txt'));
                    
                    const details = await Promise.all(txtFiles.map(async (f) => {
                        const name = f.name;
                        const year = name.substring(0, 4);
                        const monthPart = name.substring(4, 6);
                        const dayPart = name.substring(6, 8);
                        const mIdx = parseInt(monthPart) - 1;
                        const day = parseInt(dayPart);
                        
                        let title = name;
                        try {
                            const contentRes = await fetch(f.download_url);
                            const text = await contentRes.text();
                            title = parseFileText(text).title;
                        } catch (e) {}

                        return { fileName: name, year, month: mIdx, dayLabel: getOrdinal(day), displayTitle: title, fullPath: f.download_url };
                    }));
                    setFiles(details.sort((a, b) => b.fileName.localeCompare(a.fileName)));
                } catch (e) { addLog(`Error: ${e.message}`); }
            };

            useEffect(() => { scanDataFolder(); }, []);

            const loadFile = async (f) => {
                try {
                    const res = await fetch(f.fullPath);
                    const parsed = parseFileText(await res.text());
                    setFileContent(parsed);
                    setActiveFile(f.fileName);
                    setQuizType(null);
                    setIsFinished(false);
                    setSelectedWordIds([]);
                    setIsSelectionMode(false);
                } catch (e) { addLog("Load error."); }
            };

            const activeDeck = useMemo(() => {
                if (isSelectionMode && selectedWordIds.length > 0) {
                    return fileContent.vocab.filter(v => selectedWordIds.includes(v.id));
                }
                return fileContent.vocab;
            }, [fileContent.vocab, selectedWordIds, isSelectionMode]);

            const startQuiz = (type, cards = activeDeck) => {
                if (cards.length === 0) return; 
                setSessionCards([...cards].sort(() => Math.random() - 0.5));
                setQuizType(type);
                setIsFinished(false);
                setIsFlipped(false);
                setMcqSelected(null);
                setMistakeTracker([]);
                setShowNextButton(false);
            };

            const handleCorrect = () => {
                const next = sessionCards.slice(1);
                if (next.length === 0) setIsFinished(true);
                else { setSessionCards(next); setIsFlipped(false); setMcqSelected(null); setShowNextButton(false); }
            };

            const handleIncorrect = () => {
                const current = sessionCards[0];
                if (!mistakeTracker.find(c => c.id === current.id)) setMistakeTracker(prev => [...prev, current]);
                if (quizType === 'flash' && !isFlipped) {
                    setIsFlipped(true);
                    setShowNextButton(true);
                } else {
                    const remaining = sessionCards.slice(1);
                    const randomIndex = Math.floor(Math.random() * (remaining.length + 1));
                    const newDeck = [...remaining];
                    newDeck.splice(randomIndex, 0, current);
                    setSessionCards(newDeck);
                    setIsFlipped(false);
                    setMcqSelected(null);
                    setShowNextButton(false);
                }
            };

            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (!isDragging) return;
                    const sidebarWidth = 320;
                    const workspaceWidth = window.innerWidth - sidebarWidth;
                    let relativeX = e.clientX - sidebarWidth;
                    let percent = (relativeX / workspaceWidth) * 100;
                    setSplitPercent(Math.min(Math.max(percent, 10), 90));
                };
                const handleMouseUp = () => { setIsDragging(false); document.body.style.cursor = 'default'; };
                if (isDragging) {
                    window.addEventListener('mousemove', handleMouseMove);
                    window.addEventListener('mouseup', handleMouseUp);
                    document.body.style.cursor = 'col-resize';
                }
                return () => { window.removeEventListener('mousemove', handleMouseMove); window.removeEventListener('mouseup', handleMouseUp); };
            }, [isDragging]);

            return (
                <div className="flex h-screen w-screen overflow-hidden select-none font-bold text-slate-900 dark:text-slate-100 transition-colors duration-300">
                    <div className="w-80 bg-slate-900 dark:bg-[#0a0f1a] text-slate-400 flex flex-col flex-shrink-0 z-50 shadow-2xl border-r border-transparent dark:border-slate-800 transition-colors duration-300">
                        <div className="p-6 border-b border-slate-800 flex items-center justify-between text-white font-bold">
                            <button onClick={() => setCurrentYear(y => y-1)} className="p-2 hover:bg-slate-800 rounded-lg">{"<"}</button>
                            <span className="font-black text-2xl tracking-tighter">{currentYear}</span>
                            <button onClick={() => setCurrentYear(y => y+1)} className="p-2 hover:bg-slate-800 rounded-lg">{">"}</button>
                        </div>
                        <div className="flex-1 overflow-y-auto custom-scrollbar">
                            {MONTHS.map((m, idx) => {
                                const monthFiles = files.filter(f => f.year === String(currentYear) && f.month === idx);
                                if (monthFiles.length === 0) return null;
                                return (
                                    <div key={m} className="border-b border-slate-800/30">
                                        <button onClick={() => setOpenMonth(openMonth === idx ? null : idx)} className={`w-full flex justify-between px-6 py-5 text-xs font-black tracking-[0.2em] ${openMonth === idx ? 'bg-slate-800 text-white' : 'hover:bg-slate-800/30 text-slate-500'}`}>
                                            {m} <span className="bg-indigo-600 text-white px-2 rounded-md font-bold">{monthFiles.length}</span>
                                        </button>
                                        {openMonth === idx && monthFiles.map(f => (
                                            <button key={f.fileName} onClick={() => loadFile(f)} className={`w-full text-left pl-8 pr-4 py-4 text-[11px] border-l-4 transition-all ${activeFile === f.fileName ? 'text-indigo-400 bg-indigo-500/5 border-indigo-500 font-bold' : 'border-transparent text-slate-400 hover:text-slate-200'}`}>
                                                <span className="opacity-40 mr-2 font-black">{f.dayLabel} —</span>
                                                <span className="truncate uppercase tracking-tight font-bold">{f.displayTitle}</span>
                                            </button>
                                        ))}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col min-w-0 bg-slate-100 dark:bg-[#0f172a] transition-colors duration-300">
                        <header className="h-16 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-10 z-10 shadow-sm font-bold transition-colors duration-300">
                            <h2 className="font-black truncate text-sm tracking-tight uppercase font-bold">{fileContent.title || "Kotoba Master"}</h2>
                            <div className="flex items-center gap-4">
                                {/* Dark Mode Toggle */}
                                <button onClick={() => setIsDarkMode(!isDarkMode)} className="p-2 text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 rounded-lg transition-all" title="Toggle Theme">
                                    {isDarkMode ? <i className="lucide-sun text-lg font-bold"></i> : <i className="lucide-moon text-lg font-bold"></i>}
                                </button>
                                
                                <button onClick={() => { setIsSwapped(!isSwapped); setSplitPercent(100 - splitPercent); }} className="p-2 text-slate-400 hover:text-indigo-600 dark:hover:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-500/10 rounded-lg transition-all flex items-center gap-2">
                                    <i className="lucide-arrow-left-right text-lg font-bold"></i>
                                    <span className="text-[10px] font-black uppercase tracking-widest font-bold">Swap</span>
                                </button>
                                <div className="h-6 w-[1px] bg-slate-200 dark:bg-slate-700"></div>
                                <div className="flex bg-slate-100 dark:bg-slate-800 p-1 rounded-xl transition-colors duration-300">
                                    {['quiz', 'split', 'list'].map(mode => (
                                        <button key={mode} onClick={() => setViewMode(mode)} className={`px-6 py-2 text-[10px] font-black rounded-lg transition-all font-bold ${viewMode === mode ? 'bg-white dark:bg-slate-700 shadow-sm text-indigo-600 dark:text-indigo-400' : 'text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300'}`}>
                                            {mode.toUpperCase()}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </header>

                        <div className={`flex-1 flex overflow-hidden ${isSwapped ? 'flex-row-reverse' : ''}`}>
                            <div style={{ width: viewMode === 'split' ? `${splitPercent}%` : (viewMode === 'quiz' ? '100%' : '0%') }} className="h-full overflow-hidden flex flex-col">
                                <QuizPanel 
                                    quizScale={quizScale} setQuizScale={setQuizScale} 
                                    activeFile={activeFile} isFinished={isFinished} 
                                    mistakeTracker={mistakeTracker} startQuiz={startQuiz} 
                                    quizType={quizType} fullVocab={fileContent.vocab} activeDeck={activeDeck} 
                                    sessionCards={sessionCards} isFlipped={isFlipped} setIsFlipped={setIsFlipped} 
                                    mcqSelected={mcqSelected} setMcqSelected={setMcqSelected} 
                                    handleCorrect={handleCorrect} handleIncorrect={handleIncorrect} 
                                    showNextButton={showNextButton} setQuizType={setQuizType} setIsFinished={setIsFinished}
                                    isSelectionMode={isSelectionMode} 
                                />
                            </div>
                            
                            {viewMode === 'split' && <div className={`resizer ${isDragging ? 'dragging' : ''}`} onMouseDown={() => setIsDragging(true)}></div>}
                            
                            <div style={{ width: viewMode === 'split' ? `${100 - splitPercent}%` : (viewMode === 'list' ? '100%' : '0%') }} className="h-full overflow-hidden flex flex-col">
                                <VocabTablePanel 
                                    fileContent={fileContent} 
                                    selectedWordIds={selectedWordIds} setSelectedWordIds={setSelectedWordIds}
                                    isSelectionMode={isSelectionMode} setIsSelectionMode={setIsSelectionMode} 
                                />
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const QuizPanel = ({ quizScale, setQuizScale, activeFile, isFinished, mistakeTracker, startQuiz, quizType, fullVocab, activeDeck, sessionCards, isFlipped, setIsFlipped, mcqSelected, setMcqSelected, handleCorrect, handleIncorrect, showNextButton, setQuizType, setIsFinished, isSelectionMode }) => {
            const mcqOptions = useMemo(() => {
                if (quizType !== 'mcq' || !sessionCards[0]) return [];
                const correct = sessionCards[0];
                const others = fullVocab.filter(v => v.id !== correct.id).sort(() => Math.random() - 0.5).slice(0, 3);
                return [correct, ...others].sort(() => Math.random() - 0.5);
            }, [sessionCards, quizType, fullVocab]);

            return (
                <div className="h-full bg-slate-50 dark:bg-[#0f172a] flex flex-col items-center justify-center p-12 relative overflow-y-auto w-full transition-colors duration-300">
                    <div className="absolute top-6 right-10 flex gap-2 z-50">
                        <button onClick={() => setQuizScale(Math.max(quizScale - 0.1, 0.5))} className="w-10 h-10 flex items-center justify-center bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg shadow-sm font-black text-xl font-bold hover:bg-slate-50 dark:hover:bg-slate-700">-</button>
                        <button onClick={() => setQuizScale(Math.min(quizScale + 0.1, 1.5))} className="w-10 h-10 flex items-center justify-center bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg shadow-sm font-black text-xl font-bold hover:bg-slate-50 dark:hover:bg-slate-700">+</button>
                    </div>
                    <div className="quiz-scale-container w-full flex flex-col items-center justify-center" style={{ transform: `scale(${quizScale})` }}>
                        {!activeFile ? (
                            <div className="text-slate-300 dark:text-slate-600 font-black uppercase tracking-[0.3em] text-[10px] font-bold">Waiting for input</div>
                        ) : isFinished ? (
                            <div className="max-w-2xl w-full text-center p-16 bg-white dark:bg-slate-900 rounded-[4rem] shadow-2xl border border-slate-100 dark:border-slate-800 font-bold transition-colors">
                                <div className="text-8xl mb-8 font-normal">{mistakeTracker.length === 0 ? "🏆" : "🔥"}</div>
                                <h2 className="text-6xl font-black mb-4 uppercase tracking-tighter leading-none font-bold">DONE</h2>
                                <div className="space-y-6">
                                    {mistakeTracker.length > 0 && <button onClick={() => startQuiz(quizType, mistakeTracker)} className="w-full py-10 bg-indigo-600 dark:bg-indigo-500 text-white rounded-3xl font-black shadow-xl uppercase text-lg tracking-widest font-bold">Retry Mistakes ({mistakeTracker.length})</button>}
                                    <button onClick={() => startQuiz(quizType, activeDeck)} className="w-full py-10 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-200 rounded-3xl font-black uppercase text-lg tracking-widest font-bold transition-colors">Full Restart</button>
                                    <button onClick={() => { setQuizType(null); setIsFinished(false); }} className="w-full py-6 text-indigo-600 dark:text-indigo-400 font-black text-sm uppercase tracking-widest border-t border-slate-100 dark:border-slate-800 mt-6 font-bold">Menu</button>
                                </div>
                            </div>
                        ) : !quizType ? (
                            <div className="max-w-2xl w-full space-y-10 text-center font-bold relative">
                                {isSelectionMode && activeDeck.length !== fullVocab.length && (
                                    <div className="text-indigo-500 font-black uppercase tracking-widest text-sm mb-4">Specific Study Active</div>
                                )}
                                <h3 className="text-7xl font-black mb-12 tracking-tighter leading-none font-bold">
                                    {activeDeck.length} {activeDeck.length === 1 ? 'Word' : 'Words'}
                                </h3>
                                
                                <button disabled={activeDeck.length === 0} onClick={() => startQuiz('flash')} className={`w-full py-16 border-2 rounded-[4rem] shadow-sm transition-all text-left px-20 group ${activeDeck.length === 0 ? 'bg-slate-100 dark:bg-slate-800/50 opacity-40 border-slate-200 dark:border-slate-700' : 'bg-white dark:bg-slate-800 hover:border-indigo-400 dark:hover:border-indigo-500 border-slate-100 dark:border-slate-700'}`}>
                                    <div className={`font-black text-5xl mb-2 uppercase font-bold transition-colors ${activeDeck.length === 0 ? 'text-slate-400 dark:text-slate-500' : 'group-hover:text-indigo-600 dark:group-hover:text-indigo-400'}`}>Flashcards</div>
                                    <div className="text-slate-400 dark:text-slate-500 text-sm font-black uppercase tracking-widest leading-none font-bold">Manual study</div>
                                </button>
                                <button disabled={fullVocab.length < 4 || activeDeck.length === 0} onClick={() => startQuiz('mcq')} className={`w-full py-16 border-2 rounded-[4rem] shadow-sm transition-all text-left px-20 group ${fullVocab.length < 4 || activeDeck.length === 0 ? 'bg-slate-100 dark:bg-slate-800/50 opacity-40 border-slate-200 dark:border-slate-700' : 'bg-white dark:bg-slate-800 hover:border-indigo-400 dark:hover:border-indigo-500 border-slate-100 dark:border-slate-700'}`}>
                                    <div className={`font-black text-5xl mb-2 uppercase leading-none font-bold transition-colors ${fullVocab.length < 4 || activeDeck.length === 0 ? 'text-slate-400 dark:text-slate-500' : 'group-hover:text-indigo-600 dark:group-hover:text-indigo-400'}`}>Selection</div>
                                    <div className="text-slate-400 dark:text-slate-500 text-sm font-black uppercase tracking-widest leading-none font-bold">{fullVocab.length < 4 ? "Need 4+ total words" : "Test yourself"}</div>
                                </button>
                            </div>
                        ) : (
                            <div className="w-full max-w-4xl flex flex-col items-center">
                                <div className="aspect-[16/8] w-full perspective-2000 mb-12 cursor-pointer" onClick={() => { if (quizType === 'flash' && !showNextButton) setIsFlipped(!isFlipped); if (mcqSelected) handleCorrect(); if (showNextButton) handleIncorrect(); }}>
                                    <div className={`w-full h-full card-inner relative ${isFlipped || mcqSelected ? 'flipped' : ''}`}>
                                        <div className="absolute w-full h-full bg-white dark:bg-slate-800 rounded-[4rem] shadow-2xl border border-slate-100 dark:border-slate-700 flex flex-col items-center justify-center p-20 backface-hidden font-bold transition-colors">
                                            <h1 className="text-7xl font-black mb-12 select-text text-center leading-none font-bold" onClick={e=>e.stopPropagation()}>{sessionCards[0].word}</h1>
                                            <div className="px-12 py-5 bg-slate-50 dark:bg-slate-900 text-slate-400 dark:text-slate-500 rounded-full text-sm font-black tracking-widest uppercase leading-none font-bold font-bold">FLIP</div>
                                        </div>
                                        <div className="absolute w-full h-full bg-indigo-600 dark:bg-indigo-700 rounded-[4rem] shadow-2xl flex flex-col items-center justify-center p-20 backface-hidden rotate-y-180 text-white font-bold font-bold transition-colors">
                                            <h3 className="text-5xl font-black mb-6 select-text leading-none font-bold">{sessionCards[0].word}</h3>
                                            <p className="text-indigo-200 dark:text-indigo-300 text-3xl font-black mb-12 select-text leading-none font-bold font-bold">【 {sessionCards[0].reading} 】</p>
                                            <p className="text-2xl leading-relaxed whitespace-pre-wrap font-bold text-center select-text font-bold font-bold">
                                                {formatMeaningText(sessionCards[0].meaning)}
                                            </p>
                                        </div>
                                    </div>
                                </div>
                                <div className="w-full">
                                    {quizType === 'flash' ? (
                                        showNextButton ? (
                                            <button onClick={handleIncorrect} className="w-full py-10 bg-indigo-600 dark:bg-indigo-500 text-white rounded-[2.5rem] font-black text-xl shadow-xl transition-all uppercase tracking-widest leading-none active:scale-95 font-bold font-bold">Next</button>
                                        ) : (
                                            <div className="grid grid-cols-2 gap-10 font-bold">
                                                <button onClick={handleIncorrect} className="py-10 bg-white dark:bg-slate-800 border-2 border-red-50 dark:border-red-500/20 text-red-500 dark:text-red-400 font-black text-xl hover:bg-red-50 dark:hover:bg-red-500/10 shadow-xl transition-all uppercase tracking-widest leading-none font-bold font-bold">Wrong</button>
                                                <button onClick={handleCorrect} className="py-10 bg-white dark:bg-slate-800 border-2 border-green-50 dark:border-green-500/20 text-green-500 dark:text-green-400 font-black text-xl hover:bg-green-50 dark:hover:bg-green-500/10 shadow-xl transition-all uppercase tracking-widest leading-none font-bold font-bold">Right</button>
                                            </div>
                                        )
                                    ) : (
                                        <div className="grid grid-cols-1 gap-6 w-full font-bold">
                                            {mcqOptions.map(opt => {
                                                const isCorrect = opt.id === sessionCards[0].id, isSelected = mcqSelected?.id === opt.id;
                                                let style = "bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 hover:border-indigo-400 dark:hover:border-indigo-500 font-bold";
                                                if (mcqSelected) {
                                                    if (isCorrect) style = "bg-green-500 dark:bg-green-600 border-green-500 dark:border-green-600 text-white shadow-2xl font-bold";
                                                    else if (isSelected) style = "bg-red-500 dark:bg-red-600 border-red-500 dark:border-red-600 text-white shadow-2xl font-bold";
                                                    else style = "bg-white dark:bg-slate-800 border-slate-100 dark:border-slate-700 text-slate-300 dark:text-slate-600 opacity-40 font-bold";
                                                }
                                                return (
                                                    <button key={opt.id} disabled={!!mcqSelected} onClick={() => { if (isCorrect) handleCorrect(); else { handleIncorrect(); setMcqSelected(opt); } }} className={`py-8 px-12 rounded-[2.5rem] border-4 text-2xl font-black transition-all text-left tracking-tight leading-tight font-bold ${style}`}>
                                                        {formatMeaningText(opt.meaning.split('\n')[0].substring(0, 140))}
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const VocabTablePanel = ({ fileContent, selectedWordIds, setSelectedWordIds, isSelectionMode, setIsSelectionMode }) => {
            // State for column resizing
            const [colWidths, setColWidths] = useState({ vocab: 200, reading: 200 });
            const [resizingCol, setResizingCol] = useState(null);
            const resizingRef = useRef(null);

            // Table Resizing Mouse Listeners
            useEffect(() => {
                const handleMouseMove = (e) => {
                    if (!resizingCol || !resizingRef.current) return;
                    const { col, startX, startW } = resizingRef.current;
                    const newW = Math.max(100, startW + (e.clientX - startX));
                    setColWidths(prev => ({ ...prev, [col]: newW }));
                };
                const handleMouseUp = () => setResizingCol(null);
                
                if (resizingCol) {
                    window.addEventListener('mousemove', handleMouseMove);
                    window.addEventListener('mouseup', handleMouseUp);
                    document.body.style.cursor = 'col-resize';
                }
                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseup', handleMouseUp);
                    document.body.style.cursor = 'default';
                };
            }, [resizingCol]);

            const startResizing = (col, e) => {
                e.preventDefault();
                resizingRef.current = { col, startX: e.clientX, startW: colWidths[col] };
                setResizingCol(col);
            };

            const toggleSelection = (id) => {
                if (selectedWordIds.includes(id)) setSelectedWordIds(selectedWordIds.filter(v => v !== id));
                else setSelectedWordIds([...selectedWordIds, id]);
            };

            const handleToggleMode = () => {
                if (isSelectionMode) setSelectedWordIds([]);
                setIsSelectionMode(!isSelectionMode);
            };

            const getHostname = (link) => {
                try { return new URL(link).hostname; } catch(e) { return "External Resource"; }
            };

            return (
                <div className="h-full bg-white dark:bg-[#0f172a] flex flex-col w-full relative transition-colors duration-300">
                    {fileContent.vocab.length > 0 ? (
                        <>
                            {/* Embedded Link Header Bar */}
                            {fileContent.url && (
                                <div className="h-14 bg-slate-50 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-8 shrink-0 z-10 shadow-sm transition-colors duration-300">
                                    <div className="flex items-center gap-3 overflow-hidden">
                                        <div className="w-2 h-2 rounded-full bg-indigo-400 dark:bg-indigo-500 animate-pulse"></div>
                                        <span className="text-[10px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 truncate">
                                            Source: {getHostname(fileContent.url)}
                                        </span>
                                    </div>
                                    <a href={fileContent.url} target="_blank" rel="noopener noreferrer" className="px-5 py-2 bg-indigo-600 dark:bg-indigo-500 text-white rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-indigo-700 dark:hover:bg-indigo-400 transition-all active:scale-95 flex items-center gap-2 shadow-md">
                                        Open in New Tab
                                    </a>
                                </div>
                            )}

                            {/* Table Control Header */}
                            <div className="h-16 bg-white dark:bg-[#0f172a] border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-8 shrink-0 z-10 shadow-sm transition-colors duration-300">
                                <div className="text-[11px] font-black uppercase tracking-widest text-slate-500 dark:text-slate-400 font-bold">Vocabulary List</div>
                                <div className="flex items-center gap-4">
                                    {isSelectionMode && (
                                        <button onClick={() => setSelectedWordIds(fileContent.vocab.map(v => v.id))} className="text-[10px] font-black uppercase tracking-widest text-indigo-500 dark:text-indigo-400 hover:text-indigo-700 dark:hover:text-indigo-300 font-bold transition-colors">
                                            Select All
                                        </button>
                                    )}
                                    <button 
                                        onClick={handleToggleMode} 
                                        className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all shadow-sm active:scale-95 flex items-center gap-2 font-bold ${isSelectionMode ? 'bg-indigo-600 dark:bg-indigo-500 text-white' : 'bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700'}`}
                                    >
                                        {isSelectionMode ? "Clear & Exit Specific Study" : "Specific Study"}
                                    </button>
                                </div>
                            </div>
                            
                            {/* Scrollable, Resizable Table */}
                            <div className="flex-1 overflow-y-auto custom-scrollbar relative">
                                <table className="w-full text-left border-collapse table-fixed">
                                    <thead className="sticky top-0 bg-white/95 dark:bg-[#0f172a]/95 backdrop-blur z-30 shadow-sm transition-colors duration-300">
                                        <tr>
                                            {isSelectionMode && <th className="w-16 p-4 border-b-2 border-slate-100 dark:border-slate-800"></th>}
                                            
                                            {/* Vocab Header with Drag Handle */}
                                            <th style={{ width: colWidths.vocab }} className="p-4 border-b-2 border-slate-100 dark:border-slate-800 text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 relative group transition-colors duration-300">
                                                Vocab
                                                <div onMouseDown={(e) => startResizing('vocab', e)} className="absolute right-0 top-0 bottom-0 w-2 cursor-col-resize hover:bg-indigo-500 bg-transparent transition-colors z-20"></div>
                                            </th>

                                            {/* Reading Header with Drag Handle */}
                                            <th style={{ width: colWidths.reading }} className="p-4 border-b-2 border-slate-100 dark:border-slate-800 text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 relative group transition-colors duration-300">
                                                Reading
                                                <div onMouseDown={(e) => startResizing('reading', e)} className="absolute right-0 top-0 bottom-0 w-2 cursor-col-resize hover:bg-indigo-500 bg-transparent transition-colors z-20"></div>
                                            </th>

                                            {/* Meaning Column gets the remaining space naturally */}
                                            <th className="p-4 border-b-2 border-slate-100 dark:border-slate-800 text-[10px] font-black uppercase tracking-widest text-slate-400 dark:text-slate-500 transition-colors duration-300">
                                                Meaning
                                            </th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {fileContent.vocab.map(v => {
                                            const isSelected = selectedWordIds.includes(v.id);
                                            return (
                                                <tr 
                                                    key={v.id} 
                                                    onClick={() => isSelectionMode && toggleSelection(v.id)}
                                                    className={`transition-colors border-b border-slate-50 dark:border-slate-800/50 ${isSelectionMode ? 'cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800/50' : ''} ${isSelected && isSelectionMode ? 'bg-indigo-50/60 dark:bg-indigo-500/10' : ''}`}
                                                >
                                                    {isSelectionMode && (
                                                        <td className="p-4 text-center">
                                                            <div className={`w-6 h-6 rounded flex items-center justify-center border-2 transition-colors mx-auto ${isSelected ? 'bg-indigo-500 border-indigo-500 text-white' : 'border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800'}`}>
                                                                {isSelected && <span className="font-bold text-sm">✓</span>}
                                                            </div>
                                                        </td>
                                                    )}
                                                    <td className="p-4 font-black text-2xl">{v.word}</td>
                                                    <td className="p-4 font-bold text-base text-indigo-500 dark:text-indigo-400">{v.reading}</td>
                                                    <td className="p-4 font-bold text-base text-slate-600 dark:text-slate-300 whitespace-pre-wrap leading-relaxed">{formatMeaningText(v.meaning)}</td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </>
                    ) : (
                        <div className="h-full flex items-center justify-center text-slate-300 dark:text-slate-600 font-black uppercase text-xs tracking-widest font-bold">Select a Session First</div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
